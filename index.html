<div class="hero">
    <p class="eyebrow">Landscape &amp; Architecture</p>
    <h1 class="hero-name">Yasaman<br>Ghavami</h1>
    <p class="hero-role">Landscape Architect &amp; Designer</p>
    <div class="hero-line"></div>
    <div class="contact-block" id="contact">
      <span class="contact-item">✉️ yasaman.ghavamilahiji@gmail.com</span>
      <span class="contact-item">📞 +39 3284164829</span>
      <span class="contact-item">📍 Piacenza, Italy</span>
    </div>
    <a href="CV & Portfolio_Yasaman Ghavami Lahiji.pdf" download class="btn">⬇️ Download portfolio</a>
  </div>

  <div class="book-section" id="portfolio">
    <p class="section-label">Portfolio</p>
    <div class="book-wrapper">
      <div class="book">
        <div id="loading" class="loading">Loading portfolio...</div>
        <canvas id="pdf-canvas" style="display:none;"></canvas>
        <div class="book-controls">
          <button class="nav-btn" id="prev-btn" disabled>← Prev</button>
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <span class="page-info" id="page-info">Page — of —</span>
            <div class="page-jump">
              <span>Go to</span>
              <input type="number" id="page-input" min="1" value="1" />
              <button class="nav-btn" id="go-btn">Go</button>
            </div>
          </div>
          <button class="nav-btn" id="next-btn" disabled>Next →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">© 2026 Yasaman Ghavami</span>
    <span class="footer-text">All rights reserved</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const url = 'CV & Portfolio_Yasaman Ghavami Lahiji.pdf';
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    const pageInfo = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const goBtn = document.getElementById('go-btn');
    const pageInput = document.getElementById('page-input');

    let pdfDoc = null;
    let currentPage = 1;
    let rendering = false;

    function renderPage(num) {
      if (rendering) return;
      rendering = true;
      pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale: 1.8 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        page.render({ canvasContext: ctx, viewport }).promise.then(() => {
          rendering = false;
          loading.style.display = 'none';
          canvas.style.display = 'block';
          pageInfo.textContent = 'Page ' + num + ' of ' + pdfDoc.numPages;
          pageInput.max = pdfDoc.numPages;
          prevBtn.disabled = num <= 1;
          nextBtn.disabled = num >= pdfDoc.numPages;
        });
      });
    }

    pdfjsLib.getDocument(url).promise.then(doc => {
      pdfDoc = doc;
      pageInput.max = doc.numPages;
      renderPage(currentPage);
    }).catch(() => {
      loading.textContent = 'Could not load portfolio. Please try downloading instead.';
    });

    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; pageInput.value = currentPage; renderPage(currentPage); }
    });
    nextBtn.addEventListener('click', () => {
      if (currentPage < pdfDoc.numPages) { currentPage++; pageInput.value = currentPage; renderPage(currentPage); }
    });
    goBtn.addEventListener('click', () => {
      const n = parseInt(pageInput.value);
      if (n >= 1 && n <= pdfDoc.numPages) { currentPage = n; renderPage(currentPage); }
    });
    pageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') goBtn.click();
    });
  </script>

</body>
</html>
